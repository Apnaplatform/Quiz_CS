<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBT Quiz App</title>
  <link rel="stylesheet" href="Quiz.css" />
</head>
<body>
<div class="quiz-wrapper">
    <div class="quiz-card">
      <div class="top-bar">
        <h1>Global Computer Science CBT Quiz</h1>
        <div class="timer" id="timer">Time: 08:00</div>
      </div>

      <div id="quiz-content">
        <div class="meta">
          <span id="question-number">Question 1 / 20</span>
        </div>

        <h2 id="question-text"></h2>
        <div id="options-container" class="options"></div>

        <button id="next-btn" class="btn" disabled>Next</button>
        <div class="hint">Every restart picks a fresh random set from the full question bank.</div>
      </div>

      <div id="result-content" class="hidden">
        <h2>Quiz Completed</h2>
        <p id="score-text"></p>
        <button id="restart-btn" class="btn">Restart Quiz</button>
      </div>
    </div>
  </div>
  <script src="Quiz.js"></script>
</body>
</html>
